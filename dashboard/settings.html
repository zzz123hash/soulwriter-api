<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>设置 - SoulWriter</title>
  
  <link rel="stylesheet" href="css/theme.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    .settings-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    
    .settings-header {
      margin-bottom: 32px;
    }
    
    .settings-header h1 {
      font-size: 28px;
      font-weight: 600;
      color: var(--color-text);
      margin-bottom: 8px;
    }
    
    .settings-header p {
      color: var(--color-text-secondary);
    }
    
    .settings-section {
      background: var(--color-card);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      padding: 24px;
      margin-bottom: 20px;
    }
    
    .settings-section h2 {
      font-size: 18px;
      font-weight: 600;
      color: var(--color-text);
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--color-border);
    }
    
    /* Theme Selector */
    .theme-selector {
      padding: 8px 0;
    }
    
    .theme-title {
      font-size: 14px;
      color: var(--color-text-secondary);
      margin-bottom: 16px;
      font-weight: normal;
    }
    
    .theme-options {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    
    .theme-option {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 16px 24px;
      background: var(--color-bg);
      border: 2px solid transparent;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all var(--transition-fast);
      min-width: 100px;
    }
    
    .theme-option:hover {
      background: var(--color-card);
      box-shadow: var(--shadow-sm);
    }
    
    .theme-option.active {
      border-color: var(--color-primary);
      background: rgba(124, 140, 248, 0.08);
    }
    
    .theme-preview {
      width: 48px;
      height: 32px;
      border-radius: 8px;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.1);
    }
    
    .theme-name {
      font-size: 13px;
      color: var(--color-text);
    }
    
    /* AI Config */
    .config-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    
    .form-group label {
      font-size: 13px;
      font-weight: 500;
      color: var(--color-text-secondary);
    }
    
    .form-group .input {
      padding: 10px 14px;
      font-size: 14px;
    }
    
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    
    /* Back Link */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--color-primary);
      text-decoration: none;
      font-size: 14px;
      margin-bottom: 24px;
    }
    
    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="settings-container">
    <a href="index.html" class="back-link">← 返回首页</a>
    
    <div class="settings-header">
      <h1>⚙️ 设置</h1>
      <p>个性化配置 SoulWriter</p>
    </div>
    
    <!-- 主题设置 -->
    <div class="settings-section">
      <h2>🎨 主题</h2>
      <div id="theme-container"></div>
    </div>
    
    <!-- AI 配置 -->
    <div class="settings-section">
      <h2>🤖 AI 配置</h2>
      <div class="config-form">
        <div class="form-row">
          <div class="form-group">
            <label>API 类型</label>
            <select class="input" id="ai-type">
              <option value="cloud">云端 API</option>
              <option value="local">本地模型</option>
            </select>
          </div>
          <div class="form-group">
            <label>模型</label>
            <input type="text" class="input" id="ai-model" placeholder="gpt-4o">
          </div>
        </div>
        <div class="form-group">
          <label>API 地址</label>
          <input type="text" class="input" id="ai-url" placeholder="https://api.openai.com/v1">
        </div>
        <div class="form-group">
          <label>API Key</label>
          <input type="password" class="input" id="ai-key" placeholder="sk-...">
        </div>
        <button class="btn btn-primary" onclick="saveAIConfig()">保存 AI 配置</button>
      </div>
    </div>
    
    <!-- 关于 -->
    <div class="settings-section">
      <h2>ℹ️ 关于</h2>
      <p style="color: var(--color-text-secondary); font-size: 14px;">
        SoulWriter v1.2 - 创世 × 女娲 AI 创作引擎<br>
        由未来博士团队开发
      </p>
    </div>
  </div>
  
  <script src="js/theme.js"></script>
  <script>
    ThemeManager.init();
    ThemeManager.renderSelector('theme-container');
    
    async function loadAIConfig() {
      try {
        const res = await fetch('/api/v1/ai/config');
        const data = await res.json();
        if (data.config) {
          document.getElementById('ai-type').value = data.config.type || 'cloud';
          document.getElementById('ai-model').value = data.config.model || '';
          document.getElementById('ai-url').value = data.config.baseUrl || '';
          document.getElementById('ai-key').value = data.config.apiKey || '';
        }
      } catch (e) {
        console.log('AI config not loaded');
      }
    }
    
    async function saveAIConfig() {
      const config = {
        type: document.getElementById('ai-type').value,
        model: document.getElementById('ai-model').value,
        baseUrl: document.getElementById('ai-url').value,
        apiKey: document.getElementById('ai-key').value
      };
      
      try {
        await fetch('/api/v1/ai/config', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(config)
        });
        alert('AI 配置已保存');
      } catch (e) {
        alert('保存失败: ' + e.message);
      }
    }
    
    loadAIConfig();
  </script>
</body>
</html>
