<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>API 设置 - SoulWriter</title>
  <link rel="stylesheet" href="css/drawer_layout.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #1a1a2e; --bg2: #16213e; --bg3: #0f3460;
      --accent: #e94560; --accent2: #533483;
      --text: #eaeaea; --text2: #a0a0a0; --border: #2a2a4a;
      --success: #22c55e; --warn: #f59e0b; --danger: #ef4444;
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; min-height: 100vh; }
    .header { background: var(--bg2); padding: 16px 24px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid var(--border); }
    .header h1 { font-size: 18px; flex: 1; }
    .back-btn { background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; }
    .container { max-width: 800px; margin: 0 auto; padding: 24px; }
    .section { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
    .section-title { font-size: 14px; font-weight: 600; color: var(--accent); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 6px; }
    .field input, .field select { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 9px 12px; border-radius: 6px; font-size: 13px; outline: none; transition: border-color 0.2s; }
    .field input:focus, .field select:focus { border-color: var(--accent); }
    .field input[type="password"] { letter-spacing: 2px; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .btn { padding: 9px 18px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; display: inline-flex; align-items: center; gap: 6px; transition: opacity 0.2s; }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-secondary { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
    .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
    .actions { display: flex; gap: 8px; margin-top: 16px; }
    .test-result { margin-top: 10px; padding: 10px; border-radius: 6px; font-size: 12px; display: none; }
    .test-result.ok { display: block; background: rgba(34,197,94,0.15); color: var(--success); border: 1px solid var(--success); }
    .test-result.fail { display: block; background: rgba(239,68,68,0.15); color: var(--danger); border: 1px solid var(--danger); }
    .char-list { display: flex; flex-direction: column; gap: 10px; max-height: 400px; overflow-y: auto; }
    .char-item { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px; }
    .char-item-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .char-item-name { font-weight: 600; font-size: 14px; flex: 1; }
    .char-item-badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; }
    .char-item-badge.global { background: rgba(59,130,246,0.2); color: #3b82f6; }
    .char-item-badge.custom { background: rgba(34,197,94,0.2); color: var(--success); }
    .char-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .char-field input, .char-field select { background: var(--bg2); border: 1px solid var(--border); color: var(--text); padding: 7px 10px; border-radius: 5px; font-size: 12px; width: 100%; }
    .char-field label { font-size: 11px; color: var(--text2); margin-bottom: 3px; display: block; }
    .empty-state { text-align: center; padding: 30px; color: var(--text2); }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="header">
    <button class="back-btn" onclick="location.href='/'">返回</button>
    <h1>API 设置</h1>
  </div>
  <div class="container">
    <div class="section">
      <div class="section-title">全局 AI 配置</div>
      <div class="field-row">
        <div class="field">
          <label>API 类型</label>
          <select id="global-type"><option value="cloud">云端 API</option><option value="local">本地模型</option></select>
        </div>
        <div class="field">
          <label>模型名称</label>
          <input id="global-model" placeholder="如: gpt-4o">
        </div>
      </div>
      <div class="field">
        <label>Base URL</label>
        <input id="global-baseurl" placeholder="https://api.openai.com/v1">
      </div>
      <div class="field">
        <label>API Key</label>
        <input id="global-apikey" type="password" placeholder="sk-...">
      </div>
      <div class="field-row">
        <div class="field">
          <label>本地端口</label>
          <input id="global-port" type="number" value="42897">
        </div>
        <div class="field">
          <label>本地模型</label>
          <input id="global-localmodel" placeholder="qwen-1.5b">
        </div>
      </div>
      <div class="actions">
        <button class="btn btn-primary" id="save-global-btn">保存全局配置</button>
        <button class="btn btn-secondary" id="test-global-btn">测试连接</button>
      </div>
      <div id="test-result-global" class="test-result"></div>
    </div>
    <div class="section">
      <div class="section-title">角色独立 API 配置</div>
      <p style="font-size:12px;color:var(--text2);margin-bottom:14px;">为特定角色单独配置 API，覆盖全局设置。</p>
      <div id="char-list" class="char-list"><div class="empty-state">加载中...</div></div>
    </div>
  </div>
  <script>
    var globalConfig = null;
    var bookCharacters = [];

    async function loadGlobalConfig() {
      try {
        var res = await fetch('/api/settings/global');
        var result = await res.json();
        if (result.success && result.data) {
          globalConfig = result.data;
          document.getElementById('global-type').value = globalConfig.type || 'cloud';
          document.getElementById('global-model').value = globalConfig.model || '';
          document.getElementById('global-baseurl').value = globalConfig.baseUrl || '';
          document.getElementById('global-apikey').value = globalConfig.apiKey || '';
          document.getElementById('global-port').value = globalConfig.localPort || 42897;
          document.getElementById('global-localmodel').value = globalConfig.localModel || '';
        }
      } catch (e) { console.error(e); }
    }

    async function loadCharacters() {
      try {
        var res = await fetch('/api/books');
        var result = await res.json();
        if (result.success && result.data && result.data.length > 0) {
          var book = result.data[0];
          var entities = await fetch('/api/entities/' + book.id + '/roles').then(function(r) { return r.json(); });
          if (entities.success) {
            bookCharacters = entities.data || [];
            renderCharList();
          }
        }
      } catch (e) { console.error(e); }
    }

    async function loadCharConfigs() {
      try {
        var res = await fetch('/api/settings/ai-configs');
        return (await res.json()).data || [];
      } catch (e) { return []; }
    }

    async function renderCharList() {
      var configs = await loadCharConfigs();
      var el = document.getElementById('char-list');
      if (!bookCharacters.length) {
        el.innerHTML = '<div class="empty-state">当前书本暂无角色</div>';
        return;
      }
      var html = '';
      bookCharacters.forEach(function(c) {
        var cfg = configs.find(function(x) { return x.id === c.id; });
        var name = escapeHtml(c.title || c.name || '未命名');
        html += '<div class="char-item" id="char-' + c.id + '">' +
          '<div class="char-item-header">' +
            '<span class="char-item-name">' + name + '</span>' +
            '<span class="char-item-badge ' + (cfg ? 'custom' : 'global') + '">' + (cfg ? '独立配置' : '使用全局') + '</span>' +
            (cfg ? '<button class="btn btn-danger" style="padding:4px 10px;font-size:11px;" onclick="deleteCharConfig(\'' + c.id + '\')">删除</button>' : '') +
          '</div>' +
          '<div class="char-fields">' +
            '<div class="char-field"><label>模型</label><input id="cm-' + c.id + '-model" value="' + escapeHtml(cfg ? cfg.model : '') + '" placeholder="覆盖全局"></div>' +
            '<div class="char-field"><label>API类型</label>' +
              '<select id="cm-' + c.id + '-type"><option value="cloud"' + ( (!cfg && globalConfig && globalConfig.type === 'cloud') || (cfg && cfg.type === 'cloud') ? ' selected' : '') + '>云端</option><option value="local"' + (cfg && cfg.type === 'local' ? ' selected' : '') + '>本地</option></select>' +
            '</div>' +
            '<div class="char-field"><label>Base URL</label><input id="cm-' + c.id + '-url" value="' + escapeHtml(cfg ? cfg.baseUrl : '') + '" placeholder="覆盖全局"></div>' +
            '<div class="char-field"><label>API Key</label><input id="cm-' + c.id + '-key" type="password" value="" placeholder="留空则用全局"></div>' +
          '</div>' +
          '<div class="actions" style="margin-top:10px;">' +
            '<button class="btn btn-primary" style="padding:6px 12px;font-size:12px;" onclick="saveCharConfig(\'' + c.id + '\')">保存</button>' +
          '</div>' +
        '</div>';
      });
      el.innerHTML = html;
    }

    async function saveCharConfig(characterId) {
      var data = {
        id: characterId,
        characterId: characterId,
        type: document.getElementById('cm-' + characterId + '-type').value,
        model: document.getElementById('cm-' + characterId + '-model').value,
        baseUrl: document.getElementById('cm-' + characterId + '-url').value,
        apiKey: document.getElementById('cm-' + characterId + '-key').value
      };
      await fetch('/api/settings/character', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      renderCharList();
    }

    async function deleteCharConfig(characterId) {
      if (!confirm('确认删除此角色的独立配置？')) return;
      await fetch('/api/settings/character/' + characterId, { method: 'DELETE' });
      renderCharList();
    }

    document.getElementById('save-global-btn').addEventListener('click', async function() {
      var btn = this;
      btn.disabled = true;
      btn.innerHTML = '保存中...';
      var data = {
        type: document.getElementById('global-type').value,
        model: document.getElementById('global-model').value,
        baseUrl: document.getElementById('global-baseurl').value,
        apiKey: document.getElementById('global-apikey').value,
        localPort: parseInt(document.getElementById('global-port').value) || 42897,
        localModel: document.getElementById('global-localmodel').value
      };
      await fetch('/api/settings/global', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      btn.disabled = false;
      btn.innerHTML = '保存全局配置';
      globalConfig = data;
      renderCharList();
      alert('全局配置已保存');
    });

    document.getElementById('test-global-btn').addEventListener('click', async function() {
      var btn = this;
      var resultEl = document.getElementById('test-result-global');
      btn.disabled = true;
      btn.innerHTML = '测试中...';
      resultEl.className = 'test-result';
      resultEl.style.display = 'none';
      var type = document.getElementById('global-type').value;
      var baseUrl = document.getElementById('global-baseurl').value;
      var apiKey = document.getElementById('global-apikey').value;
      try {
        if (type === 'cloud' && apiKey) {
          var testRes = await fetch(baseUrl + '/models', {
            headers: { 'Authorization': 'Bearer ' + apiKey }
          });
          if (testRes.ok) {
            resultEl.className = 'test-result ok';
            resultEl.textContent = '连接成功！API Key 有效。';
          } else {
            resultEl.className = 'test-result fail';
            resultEl.textContent = '连接失败：' + testRes.status;
          }
        } else {
          var localPort = document.getElementById('global-port').value;
          var localTest = await fetch('http://localhost:' + localPort + '/v1/models');
          if (localTest.ok) {
            resultEl.className = 'test-result ok';
            resultEl.textContent = '本地模型连接成功！';
          } else {
            resultEl.className = 'test-result fail';
            resultEl.textContent = '本地模型连接失败';
          }
        }
      } catch (e) {
        resultEl.className = 'test-result fail';
        resultEl.textContent = '连接异常：' + e.message;
      }
      btn.disabled = false;
      btn.innerHTML = '测试连接';
    });

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    loadGlobalConfig().then(function() { renderCharList(); });
  </script>
</body>
</html>
