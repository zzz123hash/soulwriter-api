<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>SoulWriter Books</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0f23;--bg2:#1a1a3e;--bg3:#16213e;--accent:#6366f1;--text:#e2e8f0;--text2:#94a3b8;--border:#2a2a4a}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;justify-content:space-between;align-items:center}
.header-title{font-size:1.4em;font-weight:700;background:linear-gradient(135deg,#f5c518,#e94560);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.main{display:flex;height:calc(100vh - 65px)}
.sidebar{width:260px;background:var(--bg2);border-right:1px solid var(--border);padding:20px}
.content{flex:1;padding:24px;overflow-y:auto}
.shelf{padding:12px 16px;background:var(--bg3);border-radius:8px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:10px}
.shelf:hover,.shelf.active{background:var(--accent)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:20px}
.card{background:var(--bg3);border-radius:12px;overflow:hidden;cursor:pointer;transition:all .2s}
.card:hover{transform:translateY(-4px);border:1px solid var(--accent)}
.card-cover{height:140px;background:linear-gradient(135deg,var(--accent),#a855f7);display:flex;align-items:center;justify-content:center;font-size:3em}
.card-info{padding:16px}
.card-title{font-weight:600;margin-bottom:4px}
.card-meta{font-size:.85em;color:var(--text2);display:flex;justify-content:space-between}
.btn{padding:10px 20px;border:none;border-radius:8px;cursor:pointer;font-size:.95em;font-weight:500}
.btn-primary{background:var(--accent);color:#fff}
.btn-secondary{background:var(--bg3);border:1px solid var(--border);color:var(--text)}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:1000}
.modal.show{display:flex}
.modal-box{background:var(--bg2);border-radius:16px;width:90%;max-width:450px;padding:24px;border:1px solid var(--border)}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-title{font-size:1.2em;font-weight:600}
.modal-close{background:none;border:none;color:var(--text2);font-size:1.5em;cursor:pointer}
.form-group{margin-bottom:16px}
.form-label{display:block;margin-bottom:6px;font-size:.9em;color:var(--text2)}
.form-input{width:100%;padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.95em}
.form-input:focus{outline:none;border-color:var(--accent)}
.form-actions{display:flex;gap:12px;justify-content:flex-end;margin-top:20px}
.empty{text-align:center;padding:60px;color:var(--text2)}
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;background:var(--bg3);border-radius:8px;border-left:4px solid var(--accent);transform:translateY(100px);opacity:0;transition:all .3s;z-index:1001}
.toast.show{transform:translateY(0);opacity:1}
</style></head><body>
<div class="header"><div class="header-title">📚 SoulWriter Books</div><div>
<button class="btn btn-secondary" onclick="importBook()">📥 导入</button>
<button class="btn btn-primary" onclick="showCreate()">➕ 新建</button></div></div>
<div class="main">
<div class="sidebar"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
<span style="font-size:.9em;color:var(--text2)">📚 书架</span>
<button class="btn btn-secondary" style="padding:4px 10px;font-size:.85em" onclick="showCreateShelf()">➕</button></div>
<div id="shelfList"></div></div>
<div class="content"><h2 id="currentShelfTitle" style="margin-bottom:24px">📖 全部书本</h2>
<div class="grid" id="booksGrid"></div>
<div class="empty" id="emptyState" style="display:none"><div style="font-size:4em">📚</div><div>还没有书本</div><div style="margin-top:8px">点击「新建」开始创作</div></div></div>
</div>
<div class="modal" id="createModal"><div class="modal-box"><div class="modal-header"><span class="modal-title">📖 新建书本</span><button class="modal-close" onclick="closeModal('createModal')">×</button></div>
<form id="createBookForm"><div class="form-group"><label class="form-label">书名 *</label><input type="text" class="form-input" name="title" placeholder="输入书名" required></div>
<div class="form-group"><label class="form-label">作者</label><input type="text" class="form-input" name="author" placeholder="作者名称"></div>
<div class="form-group"><label class="form-label">简介</label><textarea class="form-input" name="description" placeholder="书籍简介..." style="min-height:80px"></textarea></div>
<div class="form-actions"><button type="button" class="btn btn-secondary" onclick="closeModal('createModal')">取消</button><button type="submit" class="btn btn-primary">创建</button></div></form></div></div>
<div class="modal" id="createShelfModal"><div class="modal-box"><div class="modal-header"><span class="modal-title">📚 新建书架</span><button class="modal-close" onclick="closeModal('createShelfModal')">×</button></div>
<form id="createShelfForm"><div class="form-group"><label class="form-label">书架名称 *</label><input type="text" class="form-input" name="name" placeholder="如：玄幻小说" required></div>
<div class="form-group"><label class="form-label">描述</label><textarea class="form-input" name="description" placeholder="书架描述..." style="min-height:80px"></textarea></div>
<div class="form-actions"><button type="button" class="btn btn-secondary" onclick="closeModal('createShelfModal')">取消</button><button type="submit" class="btn btn-primary">创建</button></div></form></div></div>
<div class="toast" id="toast"></div>
<script>
let currentShelf=null,books=[],shelves=[];
async function load(){
  const r=await fetch("/api/bookshelves");shelves=(await r.json()).data||[];
  renderShelves();
  const r2=await fetch("/api/books",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"list"})});
  books=(await r2.json()).data||[];
  renderBooks()
}
function renderShelves(){
  let h="<div class="shelf "+(currentShelf?"":"active")+"" onclick="selectShelf(null)"><span>🏠</span><span style="flex:1">全部</span><span style="background:rgba(255,255,255,.1);padding:2px 8px;border-radius:12px;font-size:.8em">"+books.length+"</span></div>";
  shelves.forEach(s=>{
    const c=books.filter(b=>b.bookshelfId===s.id).length;
    h+="<div class="shelf "+(currentShelf===s.id?"active":"")+"" onclick="selectShelf('"+s.id+"')"><span>📚</span><span style="flex:1">"+s.name+"</span><span style="background:rgba(255,255,255,.1);padding:2px 8px;border-radius:12px;font-size:.8em">"+c+"</span></div>"
  });
  document.getElementById("shelfList").innerHTML=h
}
function renderBooks(){
  const g=document.getElementById("booksGrid"),e=document.getElementById("emptyState");
  let fb=currentShelf?books.filter(b=>b.bookshelfId===currentShelf):books;
  if(fb.length===0){g.innerHTML="";e.style.display="block";return}
  e.style.display="none";
  g.innerHTML=fb.map(b=>"<div class="card" onclick="openBook('"+b.id+"')"><div class="card-cover">📖</div><div class="card-info"><div class="card-title">"+b.title+"</div><div class="card-meta"><span>"+(b.author||"未知")+"</span><span>"+(b.wordCount||0)+"字</span></div></div></div>").join("")
}
function selectShelf(id){currentShelf=id;document.getElementById("currentShelfTitle").textContent=id?(shelves.find(s=>s.id===id)?.name||"书架"):"📖 全部书本";renderShelves();renderBooks()}
function showCreate(){document.getElementById("createModal").classList.add("show");document.getElementById("createBookForm").reset()}
function showCreateShelf(){document.getElementById("createShelfModal").classList.add("show");document.getElementById("createShelfForm").reset()}
function closeModal(id){document.getElementById(id).classList.remove("show")}
function openBook(id){window.location.href="/?book="+id}
function importBook(){const i=document.createElement("input");i.type="file";i.accept=".soul,.json";i.onchange=e=>{const f=e.target.files[0];if(f)toast("导入功能开发中")};i.click()}
document.getElementById("createBookForm").onsubmit=async e=>{e.preventDefault();const f=e.target,d={title:f.title.value,author:f.author.value,description:f.description.value};const r=await fetch("/api/books",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"create",...d})});const r2=await r.json();if(r2.success){toast("创建成功");closeModal("createModal");load()}else toast("创建失败")};
document.getElementById("createShelfForm").onsubmit=async e=>{e.preventDefault();const f=e.target,d={name:f.name.value,description:f.description.value};const r=await fetch("/api/bookshelves",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(d)});const r2=await r.json();if(r2.success){toast("书架创建成功");closeModal("createShelfModal");load()}else toast("创建失败")};
function toast(m){const el=document.getElementById("toast");el.textContent=m;el.className="toast show";setTimeout(()=>el.classList.remove("show"),3000)}
load();
</script></body></html>
